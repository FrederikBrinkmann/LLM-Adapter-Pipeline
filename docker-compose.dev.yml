# Development Compose - mit Hot-Reload
version: '3.8'

services:
  # Backend mit Volume-Mount für Hot-Reload
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: llm-pipeline-backend-dev
    ports:
      - "8000:8000"
    environment:
      - LLM_PIPELINE_DATABASE_URL=sqlite:///./data/pipeline.db
      - LLM_PIPELINE_CORS_ORIGINS=["http://localhost:5173","http://localhost:5174"]
      - LLM_PIPELINE_TARGET_API_BASE_URL=http://ticket_service:9000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/app/backend:ro
      - ./data:/app/data
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend
    networks:
      - llm-network-dev

  # Worker mit Volume-Mount
  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: llm-pipeline-worker-dev
    environment:
      - LLM_PIPELINE_DATABASE_URL=sqlite:///./data/pipeline.db
      - LLM_PIPELINE_TARGET_API_BASE_URL=http://ticket_service:9000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./backend:/app/backend:ro
      - ./worker:/app/worker:ro
      - ./data:/app/data
    depends_on:
      - backend
    networks:
      - llm-network-dev

  # Ticket Service mit Volume-Mount
  ticket_service:
    build:
      context: .
      dockerfile: docker/ticket_service/Dockerfile
    container_name: llm-pipeline-ticket-service-dev
    ports:
      - "9000:9000"
    volumes:
      - ./ticket_service:/app/ticket_service:ro
      - ./data:/app/data
    command: uvicorn ticket_service.main:app --host 0.0.0.0 --port 9000 --reload --reload-dir /app/ticket_service
    networks:
      - llm-network-dev

  # Frontend Dev Server (Vite)
  frontend:
    image: node:20-alpine
    container_name: llm-pipeline-frontend-dev
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_TICKETS_UI_URL=http://localhost:5174
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - llm-network-dev

  # Ticket Frontend Dev Server (Vite)
  ticket_frontend:
    image: node:20-alpine
    container_name: llm-pipeline-ticket-frontend-dev
    working_dir: /app
    ports:
      - "5174:5174"
    environment:
      - VITE_TICKETS_API_BASE_URL=http://localhost:9000
    volumes:
      - ./ticket_frontend:/app
      - ticket-frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - llm-network-dev

networks:
  llm-network-dev:
    driver: bridge

volumes:
  frontend-node-modules:
  ticket-frontend-node-modules:
