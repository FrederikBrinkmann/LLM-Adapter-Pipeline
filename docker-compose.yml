version: '3.8'

services:
  # ===========================================
  # Backend API (FastAPI)
  # ===========================================
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: llm-pipeline-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PIPELINE_DATABASE_URL=sqlite:///./data/pipeline.db
      - LLM_PIPELINE_BACKEND_CORS_ORIGINS=["*"]
      - LLM_PIPELINE_TARGET_API_BASE_URL=http://ticket_service:9000
      - LLM_PIPELINE_AUTO_SUBMIT_ENABLED=${LLM_PIPELINE_AUTO_SUBMIT_ENABLED:-false}
      - LLM_PIPELINE_AUTO_SUBMIT_ALLOW_MISSING_FIELDS=${LLM_PIPELINE_AUTO_SUBMIT_ALLOW_MISSING_FIELDS:-false}
      - LLM_PIPELINE_LLM_MODEL_IDS=${LLM_PIPELINE_LLM_MODEL_IDS:-["llama3.1:8b"]}
      - LLM_PIPELINE_LLM_DEFAULT_MODEL=${LLM_PIPELINE_LLM_DEFAULT_MODEL:-llama3.1:8b}
      - LLM_PIPELINE_OPENAI_API_KEY=${LLM_PIPELINE_OPENAI_API_KEY}
      - LLM_PIPELINE_OLLAMA_BASE_URL=${OLLAMA_HOST:-http://host.docker.internal:11434}
      # SMTP-Konfiguration für E-Mail-Versand
      - LLM_PIPELINE_SMTP_HOST=${LLM_PIPELINE_SMTP_HOST:-}
      - LLM_PIPELINE_SMTP_PORT=${LLM_PIPELINE_SMTP_PORT:-587}
      - LLM_PIPELINE_SMTP_USER=${LLM_PIPELINE_SMTP_USER:-}
      - LLM_PIPELINE_SMTP_PASSWORD=${LLM_PIPELINE_SMTP_PASSWORD:-}
      - LLM_PIPELINE_SMTP_FROM_EMAIL=${LLM_PIPELINE_SMTP_FROM_EMAIL:-}
      - LLM_PIPELINE_SMTP_FROM_NAME=${LLM_PIPELINE_SMTP_FROM_NAME:-Versicherungs-Support}
    volumes:
      - backend-data:/app/data
    depends_on:
      - ticket_service
    networks:
      - llm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Worker Service
  # ===========================================
  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: llm-pipeline-worker
    environment:
      - LLM_PIPELINE_DATABASE_URL=sqlite:///./data/pipeline.db
      - LLM_PIPELINE_TARGET_API_BASE_URL=http://ticket_service:9000
      - LLM_PIPELINE_AUTO_SUBMIT_ENABLED=${LLM_PIPELINE_AUTO_SUBMIT_ENABLED:-false}
      - LLM_PIPELINE_AUTO_SUBMIT_ALLOW_MISSING_FIELDS=${LLM_PIPELINE_AUTO_SUBMIT_ALLOW_MISSING_FIELDS:-false}
      - LLM_PIPELINE_AUTO_SUBMIT_API_BASE=http://backend:8000
      - LLM_PIPELINE_LLM_MODEL_IDS=${LLM_PIPELINE_LLM_MODEL_IDS:-["llama3.1:8b"]}
      - LLM_PIPELINE_LLM_DEFAULT_MODEL=${LLM_PIPELINE_LLM_DEFAULT_MODEL:-llama3.1:8b}
      - LLM_PIPELINE_OPENAI_API_KEY=${LLM_PIPELINE_OPENAI_API_KEY}
      - LLM_PIPELINE_OLLAMA_BASE_URL=${OLLAMA_HOST:-http://host.docker.internal:11434}
    volumes:
      - backend-data:/app/data
    depends_on:
      - backend
    networks:
      - llm-network
    restart: unless-stopped

  # ===========================================
  # Ticket Service (FastAPI)
  # ===========================================
  ticket_service:
    build:
      context: .
      dockerfile: docker/ticket_service/Dockerfile
    container_name: llm-pipeline-ticket-service
    ports:
      - "9000:9000"
    volumes:
      - ticket-data:/app/data
    networks:
      - llm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Frontend (Pipeline UI)
  # ===========================================
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000
        - VITE_TICKETS_UI_URL=http://localhost:5174
    container_name: llm-pipeline-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - llm-network

  # ===========================================
  # Ticket Frontend (Dashboard UI)
  # ===========================================
  ticket_frontend:
    build:
      context: .
      dockerfile: docker/ticket_frontend/Dockerfile
      args:
        - VITE_TICKETS_API_BASE_URL=http://localhost:9000
    container_name: llm-pipeline-ticket-frontend
    ports:
      - "5174:5174"
    depends_on:
      - ticket_service
    networks:
      - llm-network

  # ===========================================
  # Mail Ingest Service - Optional
  # ===========================================
  mail_ingest:
    build:
      context: .
      dockerfile: docker/mail_ingest/Dockerfile
    container_name: llm-pipeline-mail-ingest
    environment:
      - MAIL_IMAP_HOST=${MAIL_IMAP_HOST:-}
      - MAIL_IMAP_PORT=${MAIL_IMAP_PORT:-993}
      - MAIL_IMAP_USER=${MAIL_IMAP_USER:-}
      - MAIL_IMAP_PASSWORD=${MAIL_IMAP_PASSWORD:-}
      - MAIL_IMAP_FOLDER=${MAIL_IMAP_FOLDER:-INBOX}
      - MAIL_POLL_INTERVAL=${MAIL_POLL_INTERVAL:-30}
      - MAIL_MODEL_ID=${MAIL_MODEL_ID:-gpt-5.2}
      - MAIL_API_BASE=http://backend:8000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - backend
    networks:
      - llm-network
    profiles:
      - with-mail
    restart: unless-stopped

  # ===========================================
  # Ollama (Local LLM Server) - Optional
  # ===========================================
  ollama:
    image: ollama/ollama:latest
    container_name: llm-pipeline-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - llm-network
    profiles:
      - with-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  llm-network:
    driver: bridge

volumes:
  backend-data:
  ticket-data:
  ollama-data:
